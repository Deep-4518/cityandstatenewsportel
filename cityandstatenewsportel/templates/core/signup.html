{% extends 'base.html' %}

{% block title %}Sign Up | The Daily Portal Intelligence{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="font-family: var(--font-serif); font-size: 2.5rem; text-align: center; margin-bottom: 2rem;">Join the
        Daily Portal</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Authorized access to global and local
        news intelligence.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Start Subscription</button>
    </form>

    <div
        style="margin-top: 2rem; text-align: center; font-size: 0.9rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
        Already a member? <a href="{% url 'login' %}"
            style="color: var(--accent); font-weight: 700; text-decoration: none;">Log In</a>
    </div>
</div>
{% endblock %}
